name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  portable-checks:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run portable repository checks
        shell: pwsh
        run: ./scripts/check-portable.ps1

      - name: Explain full mod build boundary
        shell: pwsh
        run: Write-Host 'The ONITalk.dll build runs locally because Oxygen Not Included game assemblies are proprietary and are not committed.'
